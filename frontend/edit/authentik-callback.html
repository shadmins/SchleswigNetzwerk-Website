<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentik Callback – Schleswig-Netzwerk</title>
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #f5f5f5;
        }

        .callback-container {
            text-align: center;
        }

        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #e03030;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            margin: 0;
            font-size: 20px;
        }

        p {
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <h2>Wird angemeldet...</h2>
        <p>Einen Moment bitte...</p>
    </div>

    <script>
        const API = window.location.origin.includes('localhost')
            ? 'http://localhost:3000'
            : window.location.origin.replace(/edit.*/, '').replace(/\/$/, '');

        // Hole den Authorization Code aus der URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');

        if (code && state) {
            // Sende Code an Backend zum Einlösen
            fetch(`${API}/api/auth/authentik/callback?code=${encodeURIComponent(code)}&state=${encodeURIComponent(state)}`, {
                method: 'GET',
                credentials: 'include',
            })
                .then(res => {
                    // Backend gibt Redirect mit token zurück
                    if (res.redirected) {
                        window.location.href = res.url;
                    } else if (res.ok) {
                        return res.json();
                    } else {
                        throw new Error('Authentik Callback fehlgeschlagen');
                    }
                })
                .catch(err => {
                    console.error('Authentik Callback Error:', err);
                    window.location.href = './login.html?error=' + encodeURIComponent(err.message);
                });
        } else {
            // Fehler: Keine Authentik-Parameter
            window.location.href = './login.html?error=Kein%20Authorization%20Code';
        }
    </script>
</body>

</html>
